services:
  postgres:
    image: postgres:18-alpine
    container_name: stolat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stolat
      POSTGRES_USER: stolat
      POSTGRES_PASSWORD: stolat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
