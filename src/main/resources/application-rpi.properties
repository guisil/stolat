# Raspberry Pi profile — lightweight production setup

# Database (Docker container on the same Pi)
spring.datasource.url=jdbc:postgresql://localhost:5432/stolat
spring.datasource.username=stolat
spring.datasource.password=stolat

# Vaadin production mode
vaadin.launch-browser=false
vaadin.productionMode=true

# Collection
stolat.collection.music-directory=/mnt/music

# Notification
stolat.notification.send-on-startup=true

# Mail, Discogs, Volumio credentials go in application-local.properties (gitignored).
# See application-local.properties.example for the template.
