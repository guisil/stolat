# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/stolat
spring.datasource.username=stolat
spring.datasource.password=stolat

# Vaadin
vaadin.launch-browser=true

# Collection
stolat.collection.music-directory=${user.home}/Music/stolat-test

# Mail (Mailpit)
spring.mail.host=localhost
spring.mail.port=1025

# Notification
stolat.notification.recipient=user@example.com
stolat.notification.send-on-startup=true

# Volumio (uncomment to enable play buttons)
# stolat.volumio.url=http://volumio.local
